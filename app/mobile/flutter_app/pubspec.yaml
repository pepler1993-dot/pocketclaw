name: pocketclaw_flutter_app
description: PocketClaw mobile Flutter app scaffold (Android-first).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  crypto: ^3.0.6
  file_picker: ^8.1.4
  flutter_secure_storage: ^9.2.4
  flutter_web_auth_2: ^4.1.0
  http: ^1.3.0
  shared_preferences: ^2.3.3
  speech_to_text: ^7.3.0
  web_socket_channel: ^3.0.3
  cryptography: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
